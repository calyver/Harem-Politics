l_english:
 ######################
 ##Visiting the harem##
 ######################
 harem_events.0001.t: "[ROOT.Char.Custom('the_harem_uppercase_localization')]"
 
 ##First event##
 harem_events.0001.desc: "I find myself followed by my servants, once again in [ROOT.Char.Custom('random_the_harem_lowercase_localization')]."
 harem_events.0001.generic.desc: "After a frantic day, I find a moment of rest in [ROOT.Char.Custom('my_harem_lowercase_localization')]."
 harem_events.0001.end.desc: "Some company would be good.\n\nWith the options in mind, I contemplate which one I should visit."
 harem_events.0001.a: "Go visit [consort_1.GetTitledFirstName]"
 harem_events.0001.b: "To [consort_2.GetTitledFirstName]"
 harem_events.0001.c: "Call [consort_3.GetTitledFirstName]"
 harem_events.0001.d: "Go see [consort_4.GetTitledFirstName]"
 harem_events.0001.e: "I'll just take a walk"
 harem_events.0001.e.tt: "You may meet some of [harem_liege.Custom('your_consorts_localization')]"
 
 ##Good outcome##
 harem_events.0002.desc: "Visiting [target_consort.GetTitledFirstName] was the right choice. We delved into our mutual interests with an intensity that made time seem irrelevant.\n\nA sense of warmth and closeness envelops us, hinting at the possibility of an even deeper bond.\n\n"We will spend the night together, won't we?"[target_consort.GetTitledFirstName] asks, with soft pleading eyes.\n\nThe air between us feels tense with a mute desire."
 harem_events.0002.a: "Of course, I will"
 harem_events.0002.b: "I want some time alone"
 harem_events.0002.c: "I need to return to my council"
 harem_events.0002.b.tt: "You may visit another [target_consort.Custom('consort_localization')]"
 harem_events.0002.c.tt: "Ends your visit to [ROOT.Char.Custom('the_harem_lowercase_localization')]"
 
 ##Bad outcome##
 harem_events.0003.desc: "Whether it be the weather or maybe an undeniable lack of connection between [target_consort.GetTitledFirstName] and myself, but the visit did not go well.\n\nDespite my best efforts, conversation was awkward. An uncomfortable tension hangs in the air, punctuated by strained silences and forced smiles.\n\n"You won't spend the night here, will you?" [target_consort.GetTitledFirstName] asks, ready to bow in farewell."
 
 ##Meeting Consort Ying##
 harem_events.0004.t: "[ROOT.Char.Custom('the_harem_uppercase_localization')]: A Pleasant Meeting"
 harem_events.0004.start.desc: "When the responsibility is overwhelming, I find comfort in the serenity of [ROOT.Char.Custom('my_harem_lowercase_localization')].\n\n"
 harem_events.0004.butterflies.desc: "As I take a walk in its gardens, I run into [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] trying to catch butterflies! Such a playful thing."
 harem_events.0004.instrument.desc: "As I take a walk in its gardens, I run into [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] playing the [ROOT.GetCharacter.Custom('GetMusicalInstrument')]. What a pleasant melody!"
 harem_events.0004.singing.desc: "As I take a walk in its gardens, I suddenly hear a song. When I follow the voice, I am surprised to find [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] in her singing practices. What a delightful melody!"
 harem_events.0004.poetry.desc: "As I take a walk in its gardens, I suddenly hear an emotional voice. When I follow the declamation, I am surprise to find [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] reciting immersive poems. What a pleasant verse!"
 harem_events.0004.embroidery.desc: "As I take a walk in its gardens, I run into [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)], so focused on [first_consort.GetHerHis] embroidering hands, [first_consort.GetSheHe] didn't seem to notice my presence."
 harem_events.0004.gardening.desc: "As I take a walk in its gardens, I run into [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] appreciating the colorful flowers. Such a curious thing!"
 harem_events.0004.eating.desc: "As I take a walk in its halls, I run into [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] enjoying some pastries and sweet drinks. Such a hungry thing!"
 harem_events.0004.painting.desc: "As I take a walk in its halls, I run into [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] analyzing [first_consort.GetHerHis] fresh strokes on [first_consort.GetHerHis] panel! Such a creative thing."
 harem_events.0004.training.desc: "As I take a walk in its halls, I run into [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] training the latest techniques [first_consort.GetSheHe] learned! Such a disciplined thing."
 harem_events.0004.generic.desc: "As I take a walk in its halls, I find [first_consort.Custom2('MyCharacterIntroduction', ROOT.Char)] enjoying a solitary walk."
 harem_events.0004.end.desc: "\n\n[first_consort.GetSheHe|U] quickly bows after seeing me, concealing [first_consort.GetHerHis] face. After a momentary tension, [first_consort.GetSheHe] regains [first_consort.GetHerHis] composture, leaving me wondering what thoughts hide behind [first_consort.GetHerHis] face."
 
 
 ##Generic event##
 harem_events.0010.desc: "When the responsibility is overwhelming, I find comfort in the serenity of [ROOT.Char.Custom('my_harem_lowercase_localization')]. Its gentle setting offers a shelter for reflection and contemplation. In this private retreat, I find clarity and renewed strength to face the challenges that await me."
 harem_events.0010.a: "Can it be always like this?"

 ## Consort Hua scolds Lingron for singing ##
 harem_events.0011.desc: "Treading quietly along a quiet path, I find [an_daying.GetTitledFirstName] alone, singing about a flower that waits to be gathered by its master. I stay back for a moment, listening to [an_daying.GetHerHis] soft voice.\n\n"A shameless display," [hua_fei.GetTitledFirstName] appears, cutting the song short. "To sing so openly of being 'plucked'... you behave like a common [Select_CString( an_daying.IsFemale, 'vixen', 'fox' )], using cheap tricks to lure a gaze you haven't earned."\n\n[an_daying.GetFirstName] falls to [an_daying.GetHerHis] knees. "My [hua_fei.GetLadyLord|U], it was but a simple poem—"\n\n"A poem that encourages every [an_daying.Custom('concubine_localization')] to act like a street performer for favor," [hua_fei.GetFirstName] snaps. "If you do not know how to behave with the modesty expected of your station, then I shall provide a lesson in proper decorum. [ROOT.Char.Custom('random_the_harem_lowercase_localization')|U] is not a marketplace of vanities.""

 harem_events.0011.a: "[an_daying.GetHerHis|U] voice is a gift; let [an_daying.GetHerHim] finish the song in my chambers."
 harem_events.0011.b: "[hua_fei.GetTitledFirstName] is right, order must be maintained."
 harem_events.0011.c: "I have weightier matters than garden squabbles."

 #######################################################
 ## Your matriarch is mad at you for not visiting her ##
 #######################################################
 harem_events.0012.t: "[ROOT.Char.Custom('the_harem_uppercase_localization')]: Neglected Foundations"
 harem_events.0012.desc: "As I was entering [ROOT.Char.Custom('my_harem_lowercase_localization')] seeking a moment of respite, I cross paths with my [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('matriarch'))], [matriarch.GetTitledFirstName]. [matriarch.GetHerHis|U] main attendant greets me with a bow before stepping closer.\n\n"[matriarch.GetTitledFirstName] is a grace few are afforded, [ROOT.Char.Custom('FormOfAddressForLiege')|U]. [matriarch.GetHerHis|U] wisdom is the foundation of [ROOT.Char.Custom('random_the_harem_lowercase_localization')]."\n\n[matriarch.GetTitledFirstName] scoffs, [matriarch.GetHerHim] gaze looking everywhere but at me.\n\n"It is easy for a [matriarch.GetMotherFather] to remember the years of nurturing a [ROOT.Char.Custom('GetDaughterSon')]," [matriarch.GetSheHe] says, "yet how difficult it is for that [ROOT.Char.Custom('GetDaughterSon')] to remember such a favor for life. Some find the path to pleasure with ease, while the walk to an elder’s door is suddenly too long to manage."\n\nOnly then did [matriarch.GetSheHe] meet my eyes."

 harem_events.0012.a: "Your intuition is sharp. I was just coming to offer my morning greetings."
 harem_events.0012.a.desc: "You will visit [matriarch.GetTitledFirstName]"
 harem_events.0012.b: "I haven't forgotten you, but other things require my attention first."
 harem_events.0012.b.success: "You successfully smooth over [matriarch.GetHerHis] grievances... for now."
 harem_events.0012.b.failure: "[matriarch.GetSheHe|U] is insulted by your clumsy attempt at manipulation."
 harem_events.0012.c: "I go where I please in my own home."

 ###########################################
 ## An apothecary is teaching sex lessons ##
 ###########################################
 harem_events.0013.desc: "I am taking a quiet walk through [ROOT.Char.Custom('random_the_harem_lowercase_localization')] when I overhear two voices just around the corner. I stop in the moment, as I realize those are [prudent_consort.GetTitledFirstName] and [lustful_consort.GetTitledFirstName].\n\n"It is an absolute outrage!" [prudent_consort.GetFirstName] hisses. "That herbalist is treating [ROOT.Char.Custom('random_the_harem_lowercase_localization')] like a brothel, distributing manuals and teaching... 'techniques' of the bedchamber? [ROOT.Char.GetTitledFirstName] should have her whipped and thrown into the street."\n\n"Oh, don't be such a prude," [lustful_consort.GetFirstName] giggles. "It actually sounds like quite a bit of fun! I, for one, am curious to try what she is teaching. Not only would it be a new experience, but I imagine it would make [ROOT.Char.GetTitledFirstName] very happy—and help me earn quite a bit of [ROOT.Char.GetHerHis] favor!""

 harem_events.0013.a: "Bedchamber techniques? Everyone must learn them."
 harem_events.0013.b: "The herbalist has overstepped. She's banished from [ROOT.Char.Custom('random_my_harem_lowercase_localization')]."
 harem_events.0013.c: "What [ROOT.Char.Custom('my_consorts_localization')] do in their spare time is of no consequence to me."
 harem_events.0013.c.tooltip: "Some of [ROOT.Char.Custom('your_consorts_localization')] will continue their lessons."

 ###################################
 ## Two consorts gossip about you ##
 ###################################
 harem_events.0014.start.desc: "I am taking a quiet walk through [ROOT.Char.Custom('random_the_harem_lowercase_localization')] when I spot [new_consort.GetTitledFirstName] and [older_consort.GetTitledFirstName] sitting together, so engrossed in their chatter that they remain oblivious to my presence.\n\n"

 harem_events.0014.end.desc: ""And tell me," [new_consort.GetFirstName] giggles, leaning in with clear curiosity. "What is [ROOT.Char.GetTitledFirstName] like? Is [ROOT.Char.GetSheHe] gentle? Or is [ROOT.Char.GetSheHe] cold and distant?"\n\n[older_consort.GetFirstName] immediately stiffens. "Hush! Watch your mouth," [older_consort.GetSheHe] warns. "If you really want to know the truth about [ROOT.Char.GetTitledFirstName], you must understand one thing...""
 harem_events.0014.a: "I believe I can speak for myself, [new_consort.GetFirstName]"
 harem_events.0014.a.success: "[new_consort.GetFirstName] is impressed."
 harem_events.0014.b.success.tt: "Good Reputation"
 harem_events.0014.a.failure: "You intimidate [new_consort.GetFirstName]."
 harem_events.0014.b.failure.tt: "A Sullied Name"

 harem_events.0014.b: "I will stay hidden. I want to hear what they really think."
 harem_events.0014.b.tooltip: "You will eavesdrop on [new_consort.GetFirstName] and [older_consort.GetFirstName]."

 harem_events.0014.c: "Let them have their fun; such gossip is only to be expected."

 ##########################
 ## Whispers in the Hall ##
 ##########################
 harem_events.0015.desc: ""I am so new to all of this, and I feel I have so much to learn," [new_consort.GetTitledFirstName] says softly, leaning in toward [older_consort.GetTitledFirstName]. "I would truly appreciate it if you shared your wisdom with me. Is there something I should know?"\n\n[older_consort.GetFirstName] settles back with a knowing look."
 harem_events.0015.a: "I should stay and listen."

 harem_events.0016.start.desc: "[older_consort.GetFirstName] checks both ways to ensure they are truly alone before her voice drops to a sharp, low whisper.\n\n"

 # Gossiping about a rival
 harem_events.0016.rival.desc: ""That [slander_target.Custom('InsultAdjective')] [slander_target.Custom('InsultNoun')]? Keep your distance from [slander_target.GetHerHim]! [slander_target.GetTitledFirstName] is a snake who hides [slander_target.GetHerHis] rot behind false smiles and lies."\n\n[older_consort.GetSheHe|U] lets out a sharp, jagged scoff, turning [older_consort.GetHerHis] head away as if the very thought of [slander_target.GetFirstName] is an insult to the air [older_consort.GetSheHe] breathes."

 # Gossiping about two rival consorts
 harem_events.0016.rival_consorts.desc: ""Stay clear of [first_rival.GetTitledFirstName] and [second_rival.GetTitledFirstName]. Those two are locked in a bitter, poisoned feud that has no end. If you are foolish enough to befriend one, you will only be crushed by the other one.""

 # Gossiping about a liege relative who is the liege's rival
 harem_events.0016.rival_liege_relative.desc: ""Whatever you do, watch the air whenever [ROOT.Char.GetTitledFirstName] and [liege_relative.GetTitledFirstName] are near one another.Their blood is shared, but their hearts are stone. Do not pick a side; when such stones grind together, anything caught in the middle is turned to dust just to clear the way.""
 # Gossiping about a liege relative who is evil
 harem_events.0016.evil_liege_relative.desc: ""Watch your breath near [liege_relative.GetTitledFirstName] is near. [liege_relative.GetSheHe|U] is [ROOT.Char.GetTitledFirstNamePossessive] own blood, and in [ROOT.Char.Custom('random_the_harem_lowercase_localization')], blood outshouts pillow-talk. If [liege_relative.GetSheHe] chooses to break you, [ROOT.Char.GetTitledFirstName] will not lift a finger to stop it.""
 # Gossiping about a liege relative
 harem_events.0016.liege_relative.desc: ""[liege_relative.GetTitledFirstName] is the most honorable [liege_relative.GetWomanMan] in [ROOT.Char.Custom('random_the_harem_lowercase_localization')]. If you have any wit at all, you will ensure you are seen well in [liege_relative.GetHerHis] eyes. To lose [liege_relative.GetHerHis] favor is to lose your standing here entirely; it is that simple.""

 # Gossiping about the chief eunuch
 harem_events.0016.eunuch.desc: ""That... #italic thing#!. Do not be fooled by [eunuch.GetTitledFirstNamePossessive] quiet steps or bowed head. It is a hollow creature. If you are not in its good graces, you will never truly find your way into [ROOT.Char.GetTitledFirstNamePossessive] favor.""

 # Gossiping about a secret
 harem_events.0016.secret.desc: "Despite [older_consort.GetHerHis] hushed tone, the words reach my ears as [older_consort.GetSheHe] reveals a hidden stain on [secret_holder.GetTitledFirstNamePossessive] reputation. Whatever [older_consort.GetSheHe] said, it left [new_consort.GetFirstName] visibly unsettled.\n\n"Everyone in this place carries a shadow; [secret_holder.GetTitledFirstName] has merely hidden [secret_holder.GetHerHis] with more care than the rest.""

 # Gossiping about a high-ranking evil consort
 harem_events.0016.evil_authority.desc: ""Watch how you carry yourself around [evil_consort.GetTitledFirstName]. To that [evil_consort.GetWomanMan], there is no room for mercy—only an iron fist and an iron heart. For [evil_consort.GetHerHim], if a punishment is severe enough, no one would dare a transgression.""
 # Gossiping about a favored evil consort
 harem_events.0016.evil_favorite.desc: ""Do not even think of crossing [evil_favorite.GetTitledFirstName]. [evil_favorite.GetSheHe|U] may not have the highest station in [ROOT.Char.Custom('random_the_harem_lowercase_localization')], but [evil_favorite.GetSheHe] holds [ROOT.Char.GetTitledFirstNamePossessive] heart. If you aren't careful, you will find yourself cast out before [evil_favorite.GetSheHe] even breaks a sweat.""

 # Generic gossiping
 harem_events.0016.generic.desc: ""Listen well, for I will not repeat this. There is no such thing as a friend in [ROOT.Char.Custom('random_the_harem_lowercase_localization')]. There is only the weak relying on the strong, and the witless obeying the sharp. Those you call 'friends' today will surely be your enemies tomorrow. If you truly wish to survive, you must cultivate three qualities within yourself: caution, patience, and ruthlessness.""


 # Options
 harem_events.0016.a: "Your tongue has grown far too long, [older_consort.GetFirstName]."
 harem_events.0016.b: "You will offer [lower_center_character.GetTitledFirstName] a formal apology for this."
 harem_events.0016.c.secret: "Interesting... a stain I can certainly use."

 # Fallback notification
 harem_events.0001.fallback_1.title: "Quiet Walk"
 harem_events.0001.fallback_1.desc: "You didn't meet anyone in [harem_liege.Custom('random_the_harem_lowercase_localization')]."

 harem_events.0001.fallback_2.title: "Unavailable"
 harem_events.0001.fallback_2.desc: "You cannot visit [harem_liege.Custom('the_harem_lowercase_localization')] right now."
 
 