l_english:
 tradition_harem_name: "Managed Harem"
 tradition_harem_desc: "In this culture one tends to keep a number of concubines organised by multiple spouses, regardless of faith."

 culture_parameter_allows_concubinage: "Rulers may have [concubines|E] regardless of [faith|E]"
 culture_parameter_allows_polygamy: "Rulers may have more than one [spouse|E] regardless of [faith|E]"

 culture_parameter_can_appoint_four_consorts: "Sovereigns can appoint the [Glossary( 'Four Consorts', 'FOUR_CONSORTS_GLOSS' )]"
 culture_parameter_dishu_system: "[Glossary( 'Primary Children', 'DISHU_SYSTEM_GLOSS' )] have precedence to inherit titles and can lead the ancestor worship ceremonies."

 tradition_magnificent_courts_name: "Magnificent Courts"
 tradition_magnificent_courts_desc: "This culture makes extensive use of eunuchs at court, occupying positions ranging from domestic servants to bureaucratic administrators and even military commanders. Men with no desire are easy to trust."

 tradition_cosmic_order_name: "Cosmic Order" # Tiandao in China, or 天道
 tradition_cosmic_order_desc: "The domestic sphere serves as a terrestrial mirror to the eternal patterns of Heaven. From the sovereign’s inner court to a humble family home, every relationship is governed by a sacred hierarchy and a strict sense of ritual precedence."

 # Tooltips
 cannot_combine_with_eunuch_traditions: "Cannot have more than one of the following traditions:\n\t$EFFECT_LIST_BULLET$[GetCultureTradition('tradition_court_eunuchs').GetName]\n\t$EFFECT_LIST_BULLET$[GetCultureTradition('tradition_byzantine_succession').GetName]\n\t$EFFECT_LIST_BULLET$[GetCultureTradition('tradition_ep3_roman_ceremonies').GetName]\n\t$EFFECT_LIST_BULLET$[GetCultureTradition('tradition_ep3_palace_politics').GetName]\n\t$EFFECT_LIST_BULLET$[GetCultureTradition('tradition_tgp_court_machinations').GetName]\n\t$EFFECT_LIST_BULLET$[GetCultureTradition('tradition_cosmic_order').GetName]\n\t$EFFECT_LIST_BULLET$[GetCultureTradition('tradition_magnificent_courts').GetName]"

 culture_tradition_events.0100.tradition_polygamous_needs_concubines: "Your practice of polygamy alone is not supported by [faith_scope.GetAdjective] doctrine. Only through the addition of concubinage will [faith_scope.HighGodName] smile upon your people! I only wish for your salvation. Please, lead your people into the light and take up concubines!" the missive reads."

 culture_tradition_events.0100.tradition_concubines_needs_polygamy: "Your practice of concubinage alone is not supported by [faith_scope.GetAdjective] doctrine. Only through the addition of polygamous marriage will [faith_scope.HighGodName] smile upon your people! I only wish for your salvation. The duty of every good [faith_scope.GetAdjectiveNoTooltip] cannot be fulfilled with but one spouse." the missive reads."

 culture_tradition_events.0100.tradition_harem: ""The excess of both spouses and concubines in your culture is a grievous violation of [faith_scope.GetAdjective] doctrine, and it cannot be tolerated in the eyes of [faith_scope.HighGodName]! I only wish for your salvation. Please, guide your people to righteousness and abandon this indulgent practice before it leads to further sin," the missive reads."
