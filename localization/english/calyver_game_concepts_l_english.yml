l_english:
 game_concept_polygamy: "Polygamy"
 game_concept_polygamy_desc: "Polygamy allows a ruler to marry multiple [spouses|E] simultaneously, permitted in [faiths|E] with the [GetFaithDoctrine('doctrine_polygamy').GetBaseName] [doctrine|E].\n\n\n\nWhile one [spouse|E] is designated as the [primary_spouse|E], all are equally married and their children are considered fully [legitimate|E]. Polygamy marriages may secure several [alliances|E]."

 game_concept_concubinage_desc: "A Concubine is of lesser status than a [spouse|E], allowed in [faiths|E] with the [GetFaithDoctrine('doctrine_concubines').GetBaseName] [doctrine|E].\n\nUnlike [marriage|E], Concubinage does not yield [alliances|E]. Concubines can also be set aside at will, without the complications of a [divorce|E]. The children of Concubines are considered [legitimate|E]."

 game_concept_primary_spouse_desc: "A $game_concept_primary_spouse$ is a ruler's chief consort. Primary Spouses have increased [fertility|E], increased [opinion|E] of a the ruler, and may serve on their [council|E] and as head of their [harem|E]."

 secondary_spouse: "[secondary_spouses|E]"
 game_concept_secondary_spouse: "Secondary Spouse"
 game_concept_secondary_spouses: "Secondary Spouses"
 game_concept_secondary_spouses_desc: "Secondary Spouses are legally married to a character and assist in managing their [harem|E]. While the [primary_spouse|E] often holds precedence within the household, all spouses share [Concept('marriage','marital')|E] standing."
 
 harem: "[harem|E]"
 game_concept_harem: "Harem"
 game_concept_harem_desc: "The harem refers to a ruler's spouses, concubines, and, in some faiths and cultures, also relatives, and their private quarters."
 game_concept_consorts: "Consorts"
 game_concept_consort: "Consort"
 
 game_concept_consort_favor: "Favor"
 game_concept_consort_favor_desc: "Favor represents a ruler's affection for their consorts.\n\nConsorts with high favor enjoy increased influence in the [harem|E] and [fertility|E] bonuses.\n\nThe Levels are:\n$EFFECT_LIST_BULLET$[forgotten|E]\n$EFFECT_LIST_BULLET$[unfavored|E]\n$EFFECT_LIST_BULLET$[neutral|E]\n$EFFECT_LIST_BULLET$[favorite|E]\n$EFFECT_LIST_BULLET$[beloved|E]"
 
 game_concept_forgotten: "Forgotten"
 game_concept_forgotten_desc: "Forgotten consorts are abandoned by their liege and are ignored by their servants. They live in the worst conditions in the [harem|E] and face great difficulty regaining [favor|E]."
 game_concept_unfavored: "Unfavored"
 game_concept_unfavored_desc: "Unfavored consorts are ignored by their liege and have a harder time in the [harem|E]"
 game_concept_neutral: "Neutral"
 game_concept_neutral_desc: "Consorts at the neutral level are not actively noticed by their liege, but they may still catch their attention. Newcomers generally start at this level"
 game_concept_favorite: "Favorite"
 game_concept_favorite_desc: "Favorites are pampered by their liege and frequently called to their side. They can wield considerable influence within the [harem|E], regardless of their official rank"
 game_concept_beloved: "Beloved"
 game_concept_beloved_desc: "Beloved consorts are the most respected in the [harem|E], and hold the greatest influence over their liege. However, they're also prime targets for schemes"

 game_concept_harem_head: "Head of the Harem"
 game_concept_harem_head_desc: "The Head of the [harem|E] oversees order, discipline, and hierarchy within a ruler’s household."

 game_concept_harem_authority: "Harem Authority"
 game_concept_harem_authorities: "Harem Authorities"
 game_concept_harem_authorities_desc: "In Islamic [faiths|E], a ruler’s relatives have authority in their [harem|E]. Based on their familial standing, one of them will be the [harem_head|E]."

 # Four Consorts #
 FOUR_CONSORTS_GLOSS: "The #bold Four Consorts#! were the highest-ranked imperial concubines of Tang and Song. Officially holding the Senior First Rank, their standing was on par with top-level ministers.\nRepresenting #italic Nobility#!, #italic Purity#!, #italic Virtue#!, and #italic Worthiness#!, they assisted the Central Palace in managing the Inner Court. Though all had the official standing, the Noble Consort was considered the #italic first among equals#!." # 四夫人 in China

 NOBLE_CONSORT_GLOSS: "For much of China's history, the #bold Noble Consort#! was the highest rank for an imperial concubine and rivaled the power of the #italic Central Palace#!. Famously associated with [Glossary('Yang Guifei', 'YANG_GUIFEI_GLOSS')], the role's importance peaked in Late Tang: to prevent another [Glossary('Wu Zetian', 'EMPRESS_WU_GLOSS')], emperors often left the empress position vacant. This made the Noble Consort the de facto head of the harem."

 YANG_GUIFEI_GLOSS: "One of the [Glossary('Four Beauties', 'FOUR_BEAUTIES_GLOSS')] of China, #bold Yang Yuhuan#! (719–756) was the beloved consort of Emperor Xuanzong of Tang. With a beauty that was said to #italic shame flowers#!, her favor made Xuanzong neglect his duties. She was ultimately forced to take her own life during the #italic An Lushan Rebellion#!."

 FOUR_BEAUTIES_GLOSS: "The #bold Four Beauties#! are four legendary women renowned for their beauty in ancient China. They are traditionally remembered through the "spellbinding" effects they had on nature: #bold Xi Shi#! caused fish to sink; #bold Wang Zhaojun#! made geese fall from the sky; #bold Diaochan#! outshone the Moon until it hid; and #bold Yang Guifei#! caused flowers to wilt in shame."

 # Six Palaces #
 SIX_PALACES_GLOSS: "The #bold Six Palaces#! is the term for the Imperial Harem in China. Originating from the #italic Rites of Zhou#!, the ideal was that the Emperor’s residential quarters be divided into six complexes, mirroring the #italic Six Ministries#!, to maintain cosmic order."

 CENTRAL_PALACE_GLOSS: "Originally a term to refer to the Empress's residence, the #bold Central Palace#! evolved into a formal metonym for her position as the Head of the [Glossary('Six Palaces', 'SIX_PALACES_GLOSS')]."

 # Others #
 DISHU_SYSTEM_GLOSS: "Under the #bold Dishu System#!, children born to the official wife (Di) hold ritual precedence over those born to concubines (Shu). Despite wealth being divided equally among all sons, the eldest Di son inherits the family’s honorary titles and leads ancestor worship ceremonies."
 XIANGHUO_GLOSS: "In the Chinese ritual system, maintaining the #bold Incense and Fire#! refers to the spiritual continuity of a lineage. Ancestors require regular offerings to avoid becoming #italic hungry ghosts#!. If the flame is extinguished, the family fails its most sacred duty, inviting ancestral curses and social ruin."
 
